<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!--
    CHAT.HTML - GitHub front-end version
    ------------------------------------
    This page is the phone-facing fake message screen.

    Key behaviours:
    - Pulls messages from Google Sheet via Apps Script API.
    - Pulls style/theme settings from styles__Name sheet.
    - Shows profile picture from the OTHER person's styles sheet.
    - Hides the app until styles are loaded to avoid colour flash.
    - Supports notification links that jump to a target message ID.
    - Uses optimistic sending so the sender sees their message immediately.
  -->

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <title>Messages</title>

  <style>
    /* ============================================================
       1. PAGE RESET
       ============================================================ */

    html,
    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100%;
      height: 100%;
      background: #075e54;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: sans-serif;
    }

    /* ============================================================
       2. MAIN APP WRAPPER
       ------------------------------------------------------------
       The app starts invisible and becomes visible only after
       styles have loaded from the sheet. This prevents the default
       green colours flashing before the custom theme loads.
       ============================================================ */

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--chat-bg, #e5ddd5);
      opacity: 0;
    }

    .app.ready {
      opacity: 1;
    }

    /* ============================================================
       3. HEADER / TOP BAR
       ============================================================ */

    .header {
      background-color: var(--chat-header, #075e54);
      color: white;
      padding: 18px 12px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
    }

    .back-button,
    .call-button {
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      color: white;
      flex-shrink: 0;
    }

    .back-button {
      font-size: 34px;
      line-height: 28px;
      padding: 0;
      font-weight: 600;
    }

    .call-button {
      font-size: 21px;
      line-height: 1;
      color: white;
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d9d9d9, #8fb7a7);
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    .header-name {
      font-size: 20px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ============================================================
       4. MESSAGE AREA
       ============================================================ */

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background-color: var(--chat-bg, #e5ddd5);
      -webkit-overflow-scrolling: touch;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      clear: both;
      font-size: 16px;
      line-height: 1.35;
      word-wrap: break-word;
      box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    }

    .from-them {
      background: var(--received-bubble, #ffffff);
      color: #111;
      float: left;
    }

    .from-you {
      background: var(--sent-bubble, #dcf8c6);
      color: #111;
      float: right;
      margin-left: auto;
    }

    /* Temporary message shown instantly before Sheet confirms it.
       Remove opacity if you want pending messages to look identical. */
    .pending-message {
      opacity: 0.82;
    }

    .target-highlight {
      outline: 3px solid rgba(18,140,126,0.55);
      transition: outline 0.4s ease;
    }

    /* ============================================================
       5. IMAGE MESSAGES
       ------------------------------------------------------------
       Change image size here in production if needed.
       Current width: 200px.
       ============================================================ */

    .image-message {
      padding: 4px;
      background: transparent;
      box-shadow: none;
    }

    .image-message img {
      display: block;
      width: 200px;
      max-width: 100%;
      border-radius: 10px;
    }

    /* ============================================================
       6. TIMESTAMP DIVIDERS
       ============================================================ */

    .timestamp-divider {
      clear: both;
      text-align: center;
      margin: 14px 0 10px;
    }

    .timestamp-divider span {
      display: inline-block;
      background: var(--timestamp-bubble, rgba(255,255,255,0.75));
      color: #666;
      font-size: 12px;
      padding: 4px 9px;
      border-radius: 10px;
    }

    /* ============================================================
       7. FOOTER / MESSAGE COMPOSER
       ============================================================ */

    .footer {
      background-color: var(--chat-footer, #f0f0f0);
      display: flex;
      padding: 10px 12px 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      align-items: center;
      flex-shrink: 0;
      border-top: 1px solid #d0d0d0;
      gap: 8px;
    }

    .footer input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
      min-width: 0;
      outline: none;
    }

    .camera-button,
    .send-button {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-button {
      background: #ffffff;
    }

    .camera-icon {
      width: 18px;
      height: 14px;
      border: 2px solid #666;
      border-radius: 4px;
      position: relative;
      display: block;
    }

    .camera-icon::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 3px;
      width: 8px;
      height: 4px;
      background: #666;
      border-radius: 2px 2px 0 0;
    }

    .camera-icon::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 5px;
      width: 4px;
      height: 4px;
      border: 2px solid #666;
      border-radius: 50%;
    }

    .send-button {
      background: var(--send-button, #128c7e);
    }

    .send-arrow {
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid white;
      margin-left: 2px;
    }
  </style>
</head>

<body>
  <!-- ============================================================
       PAGE STRUCTURE
       ============================================================ -->

  <div class="app">
    <!-- Header -->
    <div class="header">
      <button class="back-button" type="button">‹</button>

      <div class="header-center">
        <div class="profile-circle" id="profileCircle"></div>
        <div class="header-name" id="chatHeader"></div>
      </div>

      <button class="call-button" type="button">📞</button>
    </div>

    <!-- Messages are rendered here -->
    <div class="chat-container" id="chatContainer"></div>

    <!-- Message composer -->
    <div class="footer">
      <button class="camera-button" type="button">
        <span class="camera-icon"></span>
      </button>

      <input id="messageInput" type="text" placeholder="Message">

      <button class="send-button" onclick="sendText()" type="button">
        <span class="send-arrow"></span>
      </button>
    </div>
  </div>

  <!-- ============================================================
       EXTERNAL CONFIG / HELPERS
       ------------------------------------------------------------
       config.js contains API_URL.
       shared.js contains apiGet, apiPost, getQueryParam, setCssVar,
       escapeHtml, etc.
       ============================================================ -->

  <script src="config.js"></script>
  <script src="shared.js"></script>

  <script>
    /* ============================================================
       1. INITIAL PAGE CONFIG
       ============================================================ */

    const ME = getQueryParam("me", "Jess");
    const THEM = getQueryParam("them", "Leon");
    const TARGET_MESSAGE_ID = getQueryParam("messageId", "");

    document.title = ME + " Messages";
    document.getElementById("chatHeader").textContent = THEM;

    /* ============================================================
       2. LOCAL STATE
       ------------------------------------------------------------
       serverMessages:
         Confirmed messages returned from the Google Sheet.

       pendingMessages:
         Local-only messages shown instantly after tapping Send.
         They disappear when the Sheet version catches up.
       ============================================================ */

    let serverMessages = [];
    let pendingMessages = [];

    let lastRendered = "";
    let didScrollToTarget = false;

    /* ============================================================
       3. STYLE LOADING
       ------------------------------------------------------------
       Pulls this phone's chat theme and the other person's profile
       image from the backend.
       ============================================================ */

    async function loadStyles() {
      try {
        const styles = await apiGet("getChatStyles", {
          me: ME,
          them: THEM
        });

        applyChatStyles(styles);
      } catch (error) {
        console.log("Load styles error:", error);

        // Avoid permanently blank screen if styles fail.
        document.querySelector(".app").classList.add("ready");
      }
    }

    function applyChatStyles(styles) {
      if (!styles) {
        document.querySelector(".app").classList.add("ready");
        return;
      }

      setCssVar("--chat-header", styles["Chat Header Colour"]);
      setCssVar("--chat-footer", styles["Chat Footer Colour"]);
      setCssVar("--chat-bg", styles["Chat Background Colour"]);
      setCssVar("--sent-bubble", styles["Sent Bubble Colour"]);
      setCssVar("--received-bubble", styles["Received Bubble Colour"]);
      setCssVar("--send-button", styles["Send Button Colour"]);
      setCssVar("--timestamp-bubble", styles["Timestamp Bubble Colour"]);

      if (styles["Profile Image URL"]) {
        document.getElementById("profileCircle").style.backgroundImage =
          `url("${styles["Profile Image URL"]}")`;
      }

      // Reveal app only after live styles are applied.
      document.querySelector(".app").classList.add("ready");
    }

    /* ============================================================
       4. MESSAGE LOADING
       ------------------------------------------------------------
       Pulls confirmed messages from backend and reconciles them
       with any optimistic/pending messages.
       ============================================================ */

    async function loadMessages() {
      try {
        serverMessages = await apiGet("getMessages");
        reconcilePendingMessages();
        renderMessages();
      } catch (error) {
        console.log("Load messages error:", error);
      }
    }

    /* ============================================================
       5. OPTIMISTIC MESSAGE HANDLING
       ------------------------------------------------------------
       When sender taps Send, we create a local pending message
       immediately so the sender does not wait for Apps Script/Sheets.

       The next successful loadMessages() removes the local pending
       copy once a matching confirmed message exists in the sheet.
       ============================================================ */

    function addPendingMessage(messageText) {
      const now = new Date();

      const pending = {
        messageId: "local_" + Date.now(),
        timestamp: now.toISOString(),
        sender: ME,
        type: "text",
        message: messageText,
        imageUrl: "",
        pending: true,
        createdAt: now.getTime()
      };

      pendingMessages.push(pending);
      renderMessages(true);
    }

    function reconcilePendingMessages() {
      pendingMessages = pendingMessages.filter(pending => {
        const pendingTime = new Date(pending.timestamp).getTime();

        const confirmedMatch = serverMessages.some(serverMessage => {
          if (serverMessage.sender !== pending.sender) return false;
          if (serverMessage.type !== pending.type) return false;
          if ((serverMessage.message || "") !== (pending.message || "")) return false;

          const serverTime = new Date(serverMessage.timestamp).getTime();

          // If timestamps are valid, only match recent-ish messages.
          // This prevents old identical text messages from wiping a new pending one.
          if (!isNaN(serverTime) && !isNaN(pendingTime)) {
            return Math.abs(serverTime - pendingTime) < 120000;
          }

          // Fallback if date parsing fails.
          return true;
        });

        // Keep pending message if no confirmed sheet version exists yet.
        return !confirmedMatch;
      });
    }

    function getCombinedMessages() {
      return serverMessages.concat(pendingMessages);
    }

    /* ============================================================
       6. MESSAGE RENDERING
       ============================================================ */

    function renderMessages(forceRender = false) {
      const chat = document.getElementById("chatContainer");
      const messages = getCombinedMessages();

      let previousTimeLabel = "";

      const html = messages.map(message => {
        const side = message.sender === ME ? "from-you" : "from-them";
        const timeLabel = formatTimestampLabel(message.timestamp);
        const messageId = escapeHtml(message.messageId || "");
        const pendingClass = message.pending ? " pending-message" : "";

        let timestampHtml = "";

        if (timeLabel && timeLabel !== previousTimeLabel) {
          timestampHtml = `
            <div class="timestamp-divider">
              <span>${escapeHtml(timeLabel)}</span>
            </div>
          `;
          previousTimeLabel = timeLabel;
        }

        if (message.type === "image") {
          return `
            ${timestampHtml}
            <div class="message ${side} image-message${pendingClass}" data-message-id="${messageId}">
              <img src="${escapeHtml(message.imageUrl)}">
            </div>
          `;
        }

        return `
          ${timestampHtml}
          <div class="message ${side}${pendingClass}" data-message-id="${messageId}">
            ${escapeHtml(message.message)}
          </div>
        `;
      }).join("");

      if (forceRender || html !== lastRendered) {
        chat.innerHTML = html;
        lastRendered = html;

        if (TARGET_MESSAGE_ID && !didScrollToTarget) {
          scrollToTargetWhenReady(TARGET_MESSAGE_ID);
        } else {
          chat.scrollTop = chat.scrollHeight;
        }
      }
    }

    /* ============================================================
       7. TARGET MESSAGE SCROLLING
       ------------------------------------------------------------
       Used when opening the chat from a home screen notification.
       Waits for images/layout before scrolling to improve accuracy.
       ============================================================ */

    function scrollToTargetWhenReady(messageId, attempts = 0) {
      const chat = document.getElementById("chatContainer");
      const target = chat.querySelector(`[data-message-id="${CSS.escape(messageId)}"]`);

      if (!target) {
        if (attempts < 12) {
          setTimeout(() => scrollToTargetWhenReady(messageId, attempts + 1), 150);
        } else {
          chat.scrollTop = chat.scrollHeight;
        }

        return;
      }

      const images = Array.from(chat.querySelectorAll("img"));

      const waitForImages = images.map(img => {
        if (img.complete) return Promise.resolve();

        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      });

      Promise.all(waitForImages).then(() => {
        setTimeout(() => {
          target.scrollIntoView({
            behavior: "auto",
            block: "center"
          });

          target.classList.add("target-highlight");
          didScrollToTarget = true;

          setTimeout(() => {
            target.classList.remove("target-highlight");
          }, 1800);
        }, 250);
      });
    }

    /* ============================================================
       8. MESSAGE SENDING
       ------------------------------------------------------------
       Optimistic flow:
       1. Read typed message.
       2. Clear input.
       3. Show local pending bubble immediately.
       4. Send to backend in background.
       5. Reload confirmed messages.
       ============================================================ */

    async function sendText() {
      const input = document.getElementById("messageInput");
      const message = input.value.trim();

      if (!message) return;

      input.value = "";

      // Instant local sender feedback.
      addPendingMessage(message);

      try {
        await apiPost("sendMessage", {
          sender: ME,
          message: message
        });

        // Pull sheet version as soon as backend confirms.
        loadMessages();

      } catch (error) {
        console.log("Send message error:", error);

        // Optional: leave pending bubble visible.
        // If preferred, this could be changed to mark it as failed.
      }
    }

    /* ============================================================
       9. TIMESTAMP FORMATTING
       ============================================================ */

    function formatTimestampLabel(timestampText) {
      if (!timestampText) return "";

      const date = new Date(timestampText);
      if (isNaN(date.getTime())) return timestampText;

      const now = new Date();

      const messageDateOnly = new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate()
      );

      const todayOnly = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()
      );

      const diffDays = Math.round(
        (todayOnly - messageDateOnly) / (1000 * 60 * 60 * 24)
      );

      const time = date.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      if (diffDays === 0) return "Today " + time;
      if (diffDays === 1) return "Yesterday " + time;

      if (diffDays > 1 && diffDays < 7) {
        return date.toLocaleDateString([], {
          weekday: "long"
        }) + " " + time;
      }

      return date.toLocaleDateString([], {
        day: "numeric",
        month: "short"
      }) + " " + time;
    }

    /* ============================================================
       10. EVENT LISTENERS / STARTUP
       ============================================================ */

    document.getElementById("messageInput").addEventListener("keydown", event => {
      if (event.key === "Enter") {
        sendText();
      }
    });

    loadStyles();
    loadMessages();

    // Recipient-side update speed is controlled here.
    // Lower number = faster, but more API/Sheet traffic.
    setInterval(loadMessages, 1500);
  </script>
</body>
</html>
