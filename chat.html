<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Messages</title>
  <style>
    html,body{margin:0!important;padding:0!important;width:100%;height:100%;background:#05070a;overflow:hidden;-webkit-text-size-adjust:100%;font-family:Arial,Roboto,Helvetica,sans-serif}.app{display:flex;flex-direction:column;height:100vh;background:radial-gradient(circle at 50% 0%,rgba(54,84,112,.24),transparent 32%),var(--chat-bg,#10161D);opacity:0;color:#f4f7fb}.app.ready{opacity:1}.hidden{display:none!important}.phone-status-bar{padding:calc(8px + env(safe-area-inset-top)) 18px 7px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;letter-spacing:.1px;color:rgba(244,247,251,.92);background:var(--chat-header,#18222D);flex-shrink:0}.status-right{display:flex;align-items:center;gap:7px}.signal-bars{display:flex;align-items:end;gap:2px;height:11px}.signal-bars span{width:3px;background:currentColor;border-radius:2px;opacity:1}.signal-bars span:nth-child(1){height:3px}.signal-bars span:nth-child(2){height:6px}.signal-bars span:nth-child(3){height:8px}.signal-bars span:nth-child(4){height:11px}.battery{width:24px;height:11px;border:1.6px solid currentColor;border-radius:3px;position:relative;overflow:hidden}.battery:after{content:"";position:absolute;right:-4px;top:3px;width:3px;height:5px;background:currentColor;border-radius:0 2px 2px 0}.battery-fill{height:100%;width:43%;background:currentColor}.header{background:var(--chat-header,#18222D);color:#f4f7fb;padding:10px 12px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;border-bottom:1px solid rgba(255,255,255,.07);box-shadow:0 8px 20px rgba(0,0,0,.14)}.back-button,.call-button{width:36px;height:36px;border:none;background:transparent;color:#f4f7fb;flex-shrink:0;-webkit-tap-highlight-color:transparent}.back-button{font-size:32px;line-height:28px;padding:0;font-weight:700}.call-button{display:flex;align-items:center;justify-content:center}.call-button svg{width:22px;height:22px;fill:currentColor;transform:rotate(-20deg)}.header-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;max-width:68%}.profile-circle{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.02)),#2d3a48;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);flex-shrink:0}.header-name{font-size:19px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}.chat-container{flex:1;overflow-y:auto;padding:12px 10px;background:radial-gradient(circle at 50% 0%,rgba(54,84,112,.18),transparent 32%),var(--chat-bg,#10161D);-webkit-overflow-scrolling:touch}.message{margin:10px 0;padding:10px 12px;border-radius:15px;max-width:72%;clear:both;font-size:16px;line-height:1.35;word-wrap:break-word;box-shadow:0 4px 12px rgba(0,0,0,.14)}.from-them{background:var(--received-bubble,#26313D);color:#f4f7fb;float:left;border-bottom-left-radius:5px}.from-you{background:var(--sent-bubble,#355E7D);color:#f4f7fb;float:right;margin-left:auto;border-bottom-right-radius:5px}.pending-message{opacity:.82}.target-highlight{outline:3px solid rgba(105,160,210,.55);transition:outline .4s ease}.image-message{padding:4px;background:transparent;box-shadow:none}.image-message img{display:block;width:200px;max-width:100%;border-radius:14px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.22)}.timestamp-divider{clear:both;text-align:center;margin:14px 0 10px}.timestamp-divider span{display:inline-block;background:var(--timestamp-bubble,rgba(36,48,60,.85));color:rgba(244,247,251,.76);font-size:12px;padding:5px 10px;border-radius:10px;font-weight:700}.footer{background:var(--chat-footer,#1A232D);display:flex;padding:10px 12px 24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));align-items:center;flex-shrink:0;border-top:1px solid rgba(255,255,255,.07);gap:8px}.footer input{flex:1;padding:11px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#26313D;color:#f4f7fb;font-size:16px;min-width:0;outline:none}.footer input::placeholder{color:rgba(244,247,251,.5)}.camera-button,.send-button{width:42px;height:42px;border:none;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}.camera-button{background:#26313D;color:#f4f7fb}.camera-button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.send-button{background:var(--send-button,#168D5A);color:white}.send-button svg{width:22px;height:22px;fill:currentColor}.image-viewer{position:fixed;inset:0;background:#05070a;z-index:999;display:none;overflow:hidden;touch-action:none}.image-viewer.open{display:block}.viewer-topbar{position:absolute;top:calc(8px + env(safe-area-inset-top));left:0;right:0;height:48px;display:flex;justify-content:flex-end;align-items:center;padding:0 14px;z-index:5;pointer-events:none}.viewer-close{pointer-events:auto;width:42px;height:42px;border-radius:14px;border:none;background:rgba(38,49,61,.9);color:#f4f7fb;font-size:26px;line-height:1;font-weight:600}.viewer-image{position:absolute;top:50%;left:50%;max-width:92vw;max-height:86vh;transform:translate(-50%,-50%) scale(1);transform-origin:center center;user-select:none;-webkit-user-drag:none;border-radius:8px}
  </style>
</head>
<body>
  <div class="app">
    <div class="phone-status-bar"><div id="statusTime">10:47</div><div class="status-right"><div class="signal-bars"><span></span><span></span><span></span><span></span></div><span id="statusSignal">5G</span><span id="statusBattery">43%</span><div class="battery"><div class="battery-fill" id="statusBatteryFill"></div></div></div></div>
    <div class="header"><button class="back-button" type="button">‹</button><div class="header-center"><div class="profile-circle" id="profileCircle"></div><div class="header-name" id="chatHeader"></div></div><button class="call-button" type="button"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path></svg></button></div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="footer"><button class="camera-button" type="button"><svg viewBox="0 0 24 24"><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"></path><circle cx="12" cy="13.5" r="3.5"></circle></svg></button><input id="messageInput" type="text" placeholder="Message"><button class="send-button" onclick="sendText()" type="button"><svg viewBox="0 0 24 24"><path d="M3 20.5L22 12 3 3.5v6.4L14 12 3 14.1z"></path></svg></button></div>
  </div>
  <div class="image-viewer" id="imageViewer"><div class="viewer-topbar"><button class="viewer-close" type="button" onclick="closeImageViewer()">×</button></div><img class="viewer-image" id="viewerImage" src="" alt=""></div>
  <script src="config.js"></script><script src="shared.js"></script>
  <script>
    const ME=getQueryParam("me","Jess"),THEM=getQueryParam("them","Leon"),TARGET_MESSAGE_ID=getQueryParam("messageId","");document.title=ME+" Messages";document.getElementById("chatHeader").textContent=THEM;let serverMessages=[],pendingMessages=[],lastRendered="",didScrollToTarget=false;
    async function loadStyles(){try{applyChatStyles(await apiGet("getChatStyles",{me:ME,them:THEM}))}catch(e){console.log("Load styles error:",e);document.querySelector(".app").classList.add("ready")}}
    function applyChatStyles(s){if(!s){document.querySelector(".app").classList.add("ready");return}setCssVar("--chat-header",s["Chat Header Colour"]);setCssVar("--chat-footer",s["Chat Footer Colour"]);setCssVar("--chat-bg",s["Chat Background Colour"]);setCssVar("--sent-bubble",s["Sent Bubble Colour"]);setCssVar("--received-bubble",s["Received Bubble Colour"]);setCssVar("--send-button",s["Send Button Colour"]);setCssVar("--timestamp-bubble",s["Timestamp Bubble Colour"]);if(s["Profile Image URL"])document.getElementById("profileCircle").style.backgroundImage=`url("${s["Profile Image URL"]}")`;document.querySelector(".app").classList.add("ready")}
    async function loadStatusFromHomeSettings(){try{const s=await apiGet("getHomeScreenSettings",{owner:ME});const b=parseInt(s["Battery %"]||"43",10),safe=Math.max(0,Math.min(100,isNaN(b)?43:b));document.getElementById("statusTime").textContent=s["Display Time"]||"10:47";document.getElementById("statusSignal").textContent=s["Signal"]||"5G";document.getElementById("statusBattery").textContent=safe+"%";document.getElementById("statusBatteryFill").style.width=safe+"%"}catch(e){console.log("Status settings error:",e)}}
    async function loadMessages(){try{serverMessages=await apiGet("getMessages");reconcilePendingMessages();renderMessages()}catch(e){console.log("Load messages error:",e)}}
    function addPendingMessage(messageText){const now=new Date();pendingMessages.push({messageId:"local_"+Date.now(),timestamp:now.toISOString(),sender:ME,type:"text",message:messageText,imageUrl:"",pending:true});renderMessages(true)}
    function reconcilePendingMessages(){pendingMessages=pendingMessages.filter(p=>!serverMessages.some(s=>s.sender===p.sender&&s.type===p.type&&(s.message||"")===(p.message||"")&&Math.abs(new Date(s.timestamp).getTime()-new Date(p.timestamp).getTime())<120000))}
    function getCombinedMessages(){return serverMessages.concat(pendingMessages)}
    function renderMessages(forceRender=false){const chat=document.getElementById("chatContainer"),messages=getCombinedMessages();let previousTimeLabel="";const html=messages.map(m=>{const side=m.sender===ME?"from-you":"from-them",timeLabel=formatTimestampLabel(m.timestamp),messageId=escapeHtml(m.messageId||""),pendingClass=m.pending?" pending-message":"";let timestampHtml="";if(timeLabel&&timeLabel!==previousTimeLabel){timestampHtml=`<div class="timestamp-divider"><span>${escapeHtml(timeLabel)}</span></div>`;previousTimeLabel=timeLabel}if(m.type==="image")return`${timestampHtml}<div class="message ${side} image-message${pendingClass}" data-message-id="${messageId}"><img src="${escapeHtml(m.imageUrl)}" onclick="openImageViewer('${escapeHtml(m.imageUrl)}')"></div>`;return`${timestampHtml}<div class="message ${side}${pendingClass}" data-message-id="${messageId}">${escapeHtml(m.message)}</div>`}).join("");if(forceRender||html!==lastRendered){chat.innerHTML=html;lastRendered=html;if(TARGET_MESSAGE_ID&&!didScrollToTarget)scrollToTargetWhenReady(TARGET_MESSAGE_ID);else chat.scrollTop=chat.scrollHeight}}
    const viewer=document.getElementById("imageViewer"),viewerImage=document.getElementById("viewerImage");let viewerScale=1,viewerX=0,viewerY=0,dragging=false,lastX=0,lastY=0,pinchStartDistance=0,pinchStartScale=1;function openImageViewer(src){viewerImage.src=src;viewerScale=1;viewerX=0;viewerY=0;updateViewerTransform();viewer.classList.add("open")}function closeImageViewer(){viewer.classList.remove("open");viewerImage.src=""}function updateViewerTransform(){viewerImage.style.transform=`translate(calc(-50% + ${viewerX}px), calc(-50% + ${viewerY}px)) scale(${viewerScale})`}viewer.addEventListener("wheel",e=>{e.preventDefault();viewerScale=Math.max(1,Math.min(5,viewerScale+(e.deltaY<0?.12:-.12)));updateViewerTransform()},{passive:false});viewer.addEventListener("mousedown",e=>{dragging=true;lastX=e.clientX;lastY=e.clientY});window.addEventListener("mousemove",e=>{if(!dragging)return;viewerX+=e.clientX-lastX;viewerY+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;updateViewerTransform()});window.addEventListener("mouseup",()=>dragging=false);viewer.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}if(e.touches.length===2){dragging=false;pinchStartDistance=getTouchDistance(e.touches);pinchStartScale=viewerScale}},{passive:false});viewer.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===1&&dragging){viewerX+=e.touches[0].clientX-lastX;viewerY+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;updateViewerTransform()}if(e.touches.length===2){const d=getTouchDistance(e.touches);viewerScale=Math.max(1,Math.min(5,pinchStartScale*(d/pinchStartDistance)));updateViewerTransform()}},{passive:false});viewer.addEventListener("touchend",()=>dragging=false);function getTouchDistance(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
    function scrollToTargetWhenReady(messageId,attempts=0){const chat=document.getElementById("chatContainer"),target=chat.querySelector(`[data-message-id="${CSS.escape(messageId)}"]`);if(!target){if(attempts<12)setTimeout(()=>scrollToTargetWhenReady(messageId,attempts+1),150);else chat.scrollTop=chat.scrollHeight;return}Promise.all(Array.from(chat.querySelectorAll("img")).map(img=>img.complete?Promise.resolve():new Promise(resolve=>{img.onload=resolve;img.onerror=resolve}))).then(()=>setTimeout(()=>{target.scrollIntoView({behavior:"auto",block:"center"});target.classList.add("target-highlight");didScrollToTarget=true;setTimeout(()=>target.classList.remove("target-highlight"),1800)},250))}
    async function sendText(){const input=document.getElementById("messageInput"),message=input.value.trim();if(!message)return;input.value="";addPendingMessage(message);try{await apiPost("sendMessage",{sender:ME,message});loadMessages()}catch(e){console.log("Send message error:",e)}}
    function formatTimestampLabel(t){if(!t)return"";const d=new Date(t);if(isNaN(d.getTime()))return t;const now=new Date(),md=new Date(d.getFullYear(),d.getMonth(),d.getDate()),td=new Date(now.getFullYear(),now.getMonth(),now.getDate()),diff=Math.round((td-md)/(1000*60*60*24)),time=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});if(diff===0)return"Today "+time;if(diff===1)return"Yesterday "+time;if(diff>1&&diff<7)return d.toLocaleDateString([],{weekday:"long"})+" "+time;return d.toLocaleDateString([],{day:"numeric",month:"short"})+" "+time}
    document.getElementById("messageInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendText()});loadStyles();loadStatusFromHomeSettings();loadMessages();setInterval(loadMessages,1500);setInterval(loadStatusFromHomeSettings,5000);
  </script>
</body>
</html>
