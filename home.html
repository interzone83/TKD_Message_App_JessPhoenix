<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Home Screen</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:black;-webkit-text-size-adjust:100%}.phone-screen{position:fixed;inset:0;width:100%;height:100vh;background:var(--wallpaper,linear-gradient(160deg,#12152b,#1b223f 45%,#0c302f));background-size:cover;background-position:center;color:var(--home-text,#fff);opacity:0;transition:opacity .8s ease;overflow:hidden;z-index:1}.phone-screen.awake{opacity:1}.status-bar{position:absolute;top:calc(8px + env(safe-area-inset-top));left:18px;right:18px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;z-index:5}.status-right{display:flex;align-items:center;gap:7px}.battery{width:28px;height:13px;border:1.8px solid white;border-radius:3px;position:relative;overflow:hidden}.battery:after{content:"";position:absolute;right:-4px;top:3px;width:3px;height:6px;background:white;border-radius:0 2px 2px 0}.battery-fill{height:100%;width:43%;background:white}.battery-percent{font-size:13px}.lock-info{position:absolute;top:15%;left:0;right:0;text-align:center;z-index:5}.big-time{font-size:72px;font-weight:var(--time-weight,300);line-height:1;color:var(--home-time,#fff)}.date-line{margin-top:8px;font-size:19px;font-weight:400;color:var(--home-text,#fff)}.notification{position:absolute;left:16px;right:16px;top:52%;background:var(--notification-bg,rgba(245,245,245,.92));color:var(--notification-text,#111);border-radius:18px;padding:13px 15px;box-shadow:0 8px 30px rgba(0,0,0,.25);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transform:translateY(18px);opacity:0;transition:opacity .45s ease .35s,transform .45s ease .35s;cursor:pointer;border:none;text-align:left;font-family:inherit;width:auto;display:block;z-index:6}.phone-screen.awake .notification{opacity:1;transform:translateY(0)}.notification-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#666;margin-bottom:7px}.app-name{font-weight:700;text-transform:uppercase;letter-spacing:.2px}.sender{font-size:16px;font-weight:700;margin-bottom:3px}.message{font-size:15px;line-height:1.28}.off-screen{position:fixed;inset:0;background:black;opacity:1;visibility:visible;transition:opacity .8s ease,visibility .8s ease;pointer-events:auto;z-index:20}.off-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
  </style>
</head>
<body>
  <div class="phone-screen" id="phoneScreen"><div class="status-bar"><div id="statusTime">10:47</div><div class="status-right"><span id="signal">5G</span><span class="battery-percent" id="batteryPercent">43%</span><div class="battery"><div class="battery-fill" id="batteryFill"></div></div></div></div><div class="lock-info"><div class="big-time" id="displayTime">10:47</div><div class="date-line" id="displayDate">Saturday, 16 May</div></div><button class="notification" id="notificationButton" type="button"><div class="notification-top"><span class="app-name">Messages</span><span id="notificationTime">now</span></div><div class="sender" id="notificationFrom">Jess</div><div class="message" id="notificationText">New message</div></button></div><div class="off-screen" id="offScreen"></div>
  <script src="config.js"></script><script src="shared.js"></script>
  <script>
    const ME=getQueryParam("me","Jess"),THEM=getQueryParam("them","Leon");document.title=ME+" Home Screen";let latestSettings={},wasActive=false,audioContext=null,soundArmed=false;
    function armSound(){if(soundArmed)return;try{audioContext=new(window.AudioContext||window.webkitAudioContext)();soundArmed=true}catch(e){console.log("Audio not available:",e)}}
    function playPing(){if(!soundArmed||!audioContext)return;const oscillator=audioContext.createOscillator(),gain=audioContext.createGain();oscillator.type="sine";oscillator.frequency.setValueAtTime(880,audioContext.currentTime);oscillator.frequency.exponentialRampToValueAtTime(1320,audioContext.currentTime+.12);gain.gain.setValueAtTime(.001,audioContext.currentTime);gain.gain.exponentialRampToValueAtTime(.25,audioContext.currentTime+.02);gain.gain.exponentialRampToValueAtTime(.001,audioContext.currentTime+.35);oscillator.connect(gain);gain.connect(audioContext.destination);oscillator.start();oscillator.stop(audioContext.currentTime+.35)}
    async function loadHomeScreen(){try{applyHomeSettings(await apiGet("getHomeScreenSettings",{owner:ME}))}catch(e){console.log("Home screen error:",e)}}
    function applyHomeSettings(settings){latestSettings=settings||{};applyHomeStyles(latestSettings["Styles"]||{});const active=latestSettings["Activate"]===true||String(latestSettings["Activate"]).toUpperCase()==="TRUE",phone=document.getElementById("phoneScreen"),off=document.getElementById("offScreen");if(!active){phone.classList.remove("awake");off.classList.remove("hidden");wasActive=false;return}document.getElementById("displayTime").textContent=latestSettings["Display Time"]||"10:47";document.getElementById("statusTime").textContent=latestSettings["Display Time"]||"10:47";document.getElementById("notificationTime").textContent=latestSettings["Notification Time"]||"now";document.getElementById("displayDate").textContent=formatDisplayDate(latestSettings["Display Date"]);document.getElementById("signal").textContent=latestSettings["Signal"]||"5G";const battery=parseInt(latestSettings["Battery %"]||"43",10),safeBattery=Math.max(0,Math.min(100,isNaN(battery)?43:battery));document.getElementById("batteryPercent").textContent=safeBattery+"%";document.getElementById("batteryFill").style.width=safeBattery+"%";document.getElementById("notificationFrom").textContent=latestSettings["Notification From"]||THEM||"Jess";document.getElementById("notificationText").textContent=latestSettings["Notification Text"]||"New message";if(!wasActive){setTimeout(()=>{playPing();off.classList.add("hidden");phone.classList.add("awake")},150)}else{off.classList.add("hidden");phone.classList.add("awake")}wasActive=true}
    function applyHomeStyles(styles){if(!styles)return;setCssVar("--home-time",styles["Home Time Colour"]||"#ffffff");setCssVar("--home-text",styles["Home Text Colour"]||"#ffffff");setCssVar("--notification-bg",styles["Home Notification Colour"]||"rgba(245,245,245,0.92)");setCssVar("--notification-text",styles["Home Notification Text Colour"]||"#111111");setCssVar("--time-weight",styles["Home Font Style"]==="bold"?"600":"300");setCssVar("--wallpaper",getWallpaperCss(styles["Home Wallpaper"],styles["Home Wallpaper URL"]))}
    function openChat(){const me=latestSettings["Phone Owner"]||ME||"Leon",them=latestSettings["Notification From"]||THEM||"Jess",targetMessageId=latestSettings["Target Message ID"]||"";let chatUrl="chat.html?me="+encodeURIComponent(me)+"&them="+encodeURIComponent(them);if(targetMessageId)chatUrl+="&messageId="+encodeURIComponent(targetMessageId);window.location.href=chatUrl}
    document.getElementById("notificationButton").addEventListener("click",openChat);document.getElementById("notificationButton").addEventListener("touchend",e=>{e.preventDefault();openChat()});document.body.addEventListener("touchstart",armSound,{once:true});document.body.addEventListener("click",armSound,{once:true});loadHomeScreen();setInterval(loadHomeScreen,1000);
  </script>
</body>
</html>
